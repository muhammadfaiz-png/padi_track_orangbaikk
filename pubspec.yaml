name: padi_track
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  google_fonts: ^8.1.0
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2+1
  path: ^1.9.1
  provider: ^6.1.5+1
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1    # ← untuk generate icon

flutter:
  uses-material-design: true

  # ✅ Assets ditambahkan
  assets:
    - assets/images/

# ✅ Konfigurasi icon launcher
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_paditrack.png"
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: "assets/images/logo_paditrack.png"